# Publishes @leokok/poke-agents to npmjs.org (thin launcher in npm/poke-agents/).
#
# Required repo secret: NPM_TOKEN — https://www.npmjs.com/settings/~/tokens
# (Granular: Read and write → @leokok/poke-agents)

name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  verify-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Resolve version and whether to publish
        id: meta
        working-directory: npm/poke-agents
        env:
          NPM_PACKAGE: "@leokok/poke-agents"
        run: |
          set -euo pipefail
          PKG=$(node -p "require('./package.json').version")
          echo "version=$PKG" >> "$GITHUB_OUTPUT"
          echo "Package version from package.json: $PKG"

          on_npm() {
            npm view "${NPM_PACKAGE}@${PKG}" version --registry https://registry.npmjs.org 2>/dev/null | grep -q .
          }

          if [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${GITHUB_REF_NAME#v}"
            if [ "$PKG" != "$TAG" ]; then
              echo "::error::Tag $GITHUB_REF_NAME does not match package.json version $PKG (expected v$PKG)"
              exit 1
            fi
          fi

          if on_npm; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "Version $PKG is already on npm — skipping publish."
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "Version $PKG is not on npm yet — will publish and create release."
          fi

      - name: Publish to npm
        if: steps.meta.outputs.should_publish == 'true'
        working-directory: npm/poke-agents
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: GitHub Release
        if: steps.meta.outputs.should_publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.meta.outputs.version }}
          generate_release_notes: true
